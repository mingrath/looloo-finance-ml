name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GIT_COMMIT: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv sync --locked --extra dev
      - run: uv run ruff check .
      - run: uv run pytest -q
      - run: uv run looloo-finance-ml --artifacts artifacts all
      - run: uv run looloo-finance-ml --artifacts artifacts evidence-selfcheck
      - run: uv run python -m looloo_finance_ml.evidence evidence --git-baseline HEAD^
